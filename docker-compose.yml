version: '3.8'

services:
  backend:
    build:
      context: ./backened
    container_name: mlops_backend
    ports:
      - "5000:5000"
    environment:
      - ALLOW_LIVE_TRADING=false
      - ALLOW_TESTNET_TRADING=true
      # Required to ensure the database persists between restarts
    volumes:
      - ./backened/crypto_pro.db:/app/crypto_pro.db
      - ./milestone-2/infosys/outputs/models:/milestone-2/infosys/outputs/models
      - ./reports:/app/reports:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontened/cryptopredictpro
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: mlops_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:12
    container_name: marquez_db
    environment:
      - POSTGRES_DB=marquez
      - POSTGRES_USER=marquez
      - POSTGRES_PASSWORD=marquez
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: marquez_opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=false
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  marquez-api:
    image: marquezproject/marquez:latest
    container_name: marquez_api
    ports:
      - "5001:5000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MARQUEZ_PORT=5000
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  marquez-web:
    image: marquezproject/marquez-web:latest
    container_name: marquez_web
    ports:
      - "3000:3000"
    environment:
      - MARQUEZ_HOST=marquez-api
      - MARQUEZ_PORT=5000
      - WEB_PORT=3000
    depends_on:
      - marquez-api

  prometheus:
    image: prom/prometheus:latest
    container_name: mlops_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: mlops_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  prompt-sync:
    build:
      context: ./backened
    container_name: prompt_price_sync
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "pip install yfinance && 
             while true; do 
               python scripts/sync_live_prices.py; 
               sleep 300; 
             done"
    restart: unless-stopped
