prompts:
- prompts/crypto_summary.txt
providers:
- id: echo
  config:
    echo: 'The price of {{coin}} is predicted to move from {{previous_price}} to {{predicted_price}}.
      WARNING: Crypto trading involves high risk. This is not financial advice.'
tests:
- vars:
    coin: Bitcoin
    previous_price: 7,408,635.5
    predicted_price: 7,519,765.03
  assert:
  - type: icontains
    value: risk
  - type: javascript
    value: output.toLowerCase().includes('not financial advice')
- vars:
    coin: Ethereum
    previous_price: 203,935.66
    predicted_price: 206,994.69
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Solana
    previous_price: 8,161.82
    predicted_price: 8,284.25
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Binance Coin
    previous_price: 61,714.87
    predicted_price: 62,640.59
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Bitcoin Cash
    previous_price: 35,098.4
    predicted_price: 35,624.88
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Litecoin
    previous_price: 5,167.96
    predicted_price: 5,245.48
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Chainlink
    previous_price: '910.6'
    predicted_price: '924.26'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Avalanche
    previous_price: '877.91'
    predicted_price: '891.08'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Ripple
    previous_price: '133.45'
    predicted_price: '135.45'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Polkadot
    previous_price: '117.48'
    predicted_price: '119.24'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Cardano
    previous_price: '24.0'
    predicted_price: '24.36'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Polygon
    previous_price: '8.70'
    predicted_price: '9.10'
