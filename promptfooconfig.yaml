  - type: icontains
    value: risk
- vars:
    coin: Polkadot
    previous_price: '119.88'
    predicted_price: '121.68'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Cardano
    previous_price: '24.18'
    predicted_price: '24.54'
