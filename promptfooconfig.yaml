prompts:
- prompts/crypto_summary.txt
providers:
- id: echo
  config:
    echo: 'The price of {{coin}} is predicted to move from {{previous_price}} to {{predicted_price}}.
      WARNING: Crypto trading involves high risk. This is not financial advice.'
tests:
- vars:
    coin: Bitcoin
    previous_price: 7,494,541.5
    predicted_price: 7,606,959.62
  assert:
  - type: icontains
    value: risk
  - type: javascript
    value: output.toLowerCase().includes('not financial advice')
- vars:
    coin: Ethereum
    previous_price: 205,993.62
    predicted_price: 209,083.52
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Solana
    previous_price: 8,217.17
    predicted_price: 8,340.43
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Binance Coin
    previous_price: 62,261.3
    predicted_price: 63,195.22
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Bitcoin Cash
    previous_price: 35,605.12
    predicted_price: 36,139.2
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Litecoin
    previous_price: 5,220.73
    predicted_price: 5,299.04
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Chainlink
    previous_price: '927.69'
    predicted_price: '941.61'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Avalanche
    previous_price: '892.8'
    predicted_price: '906.19'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Ripple
    previous_price: '132.55'
    predicted_price: '134.54'
