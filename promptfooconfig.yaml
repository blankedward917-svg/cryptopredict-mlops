prompts:
- prompts/crypto_summary.txt
providers:
- id: echo
  config:
    echo: 'The price of {{coin}} is predicted to move from {{previous_price}} to {{predicted_price}}.
      WARNING: Crypto trading involves high risk. This is not financial advice.'
tests:
- vars:
    coin: Bitcoin
    previous_price: 7,399,282.0
    predicted_price: 7,510,271.23
  assert:
  - type: icontains
    value: risk
  - type: javascript
    value: output.toLowerCase().includes('not financial advice')
- vars:
    coin: Ethereum
    previous_price: 203,753.34
    predicted_price: 206,809.64
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Solana
    previous_price: 8,145.12
    predicted_price: 8,267.3
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Binance Coin
    previous_price: 61,500.66
    predicted_price: 62,423.17
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Bitcoin Cash
    previous_price: 34,977.46
    predicted_price: 35,502.12
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Litecoin
    previous_price: 5,164.76
    predicted_price: 5,242.23
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Chainlink
    previous_price: '909.38'
    predicted_price: '923.02'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Avalanche
    previous_price: '875.79'
    predicted_price: '888.93'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Ripple
    previous_price: '133.06'
    predicted_price: '135.06'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Polkadot
    previous_price: '117.96'
    predicted_price: '119.73'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Cardano
    previous_price: '24.0'
    predicted_price: '24.36'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Polygon
    previous_price: '8.70'
    predicted_price: '9.10'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Dogecoin
    previous_price: '10.02'
    predicted_price: '10.17'
  assert:
  - type: icontains
    value: warning
