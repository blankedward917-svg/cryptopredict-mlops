prompts:
- prompts/crypto_summary.txt
providers:
- id: echo
  config:
    echo: 'The price of {{coin}} is predicted to move from {{previous_price}} to {{predicted_price}}.
      WARNING: Crypto trading involves high risk. This is not financial advice.'
tests:
- vars:
    coin: Bitcoin
    previous_price: 7,405,672.5
    predicted_price: 7,516,757.59
  assert:
  - type: icontains
    value: risk
  - type: javascript
    value: output.toLowerCase().includes('not financial advice')
- vars:
    coin: Ethereum
    previous_price: 204,187.95
    predicted_price: 207,250.77
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Solana
    previous_price: 8,160.3
    predicted_price: 8,282.7
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Binance Coin
    previous_price: 61,605.2
    predicted_price: 62,529.28
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Bitcoin Cash
    previous_price: 35,011.56
    predicted_price: 35,536.73
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Litecoin
    previous_price: 5,171.69
    predicted_price: 5,249.27
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Chainlink
    previous_price: '911.65'
    predicted_price: '925.32'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Avalanche
    previous_price: '877.06'
    predicted_price: '890.22'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Ripple
    previous_price: '133.32'
    predicted_price: '135.32'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Polkadot
    previous_price: '118.03'
    predicted_price: '119.8'
