prompts:
- prompts/crypto_summary.txt
providers:
- id: echo
  config:
    echo: 'The price of {{coin}} is predicted to move from {{previous_price}} to {{predicted_price}}.
      WARNING: Crypto trading involves high risk. This is not financial advice.'
tests:
- vars:
    coin: Bitcoin
    previous_price: 7,402,879.5
    predicted_price: 7,513,922.69
  assert:
  - type: icontains
    value: risk
  - type: javascript
    value: output.toLowerCase().includes('not financial advice')
- vars:
    coin: Ethereum
    previous_price: 203,810.17
    predicted_price: 206,867.32
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Solana
    previous_price: 8,145.8
    predicted_price: 8,267.99
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Binance Coin
    previous_price: 61,486.52
    predicted_price: 62,408.82
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Bitcoin Cash
    previous_price: 34,978.75
    predicted_price: 35,503.43
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Litecoin
    previous_price: 5,165.87
    predicted_price: 5,243.36
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Chainlink
    previous_price: '909.19'
    predicted_price: '922.83'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Avalanche
    previous_price: '876.05'
    predicted_price: '889.19'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Ripple
    previous_price: '133.12'
    predicted_price: '135.12'
