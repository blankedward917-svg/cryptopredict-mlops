prompts:
- prompts/crypto_summary.txt
providers:
- id: echo
  config:
    echo: 'The price of {{coin}} is predicted to move from {{previous_price}} to {{predicted_price}}.
      WARNING: Crypto trading involves high risk. This is not financial advice.'
tests:
- vars:
    coin: Bitcoin
    previous_price: 7,394,884.0
    predicted_price: 7,505,807.26
  assert:
  - type: icontains
    value: risk
  - type: javascript
    value: output.toLowerCase().includes('not financial advice')
- vars:
    coin: Ethereum
    previous_price: 203,570.55
    predicted_price: 206,624.11
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Solana
    previous_price: 8,121.99
    predicted_price: 8,243.82
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Binance Coin
    previous_price: 61,468.31
    predicted_price: 62,390.33
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Bitcoin Cash
    previous_price: 34,664.06
    predicted_price: 35,184.02
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Litecoin
    previous_price: 5,145.75
    predicted_price: 5,222.94
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Chainlink
    previous_price: '906.69'
    predicted_price: '920.29'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Avalanche
    previous_price: '872.7'
    predicted_price: '885.79'
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Ripple
    previous_price: '132.86'
    predicted_price: '134.85'
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Polkadot
    previous_price: '117.92'
    predicted_price: '119.69'
