prompts:
- prompts/crypto_summary.txt
providers:
- id: echo
  config:
    echo: 'The price of {{coin}} is predicted to move from {{previous_price}} to {{predicted_price}}.
      WARNING: Crypto trading involves high risk. This is not financial advice.'
tests:
- vars:
    coin: Bitcoin
    previous_price: 7,408,821.5
    predicted_price: 7,519,953.82
  assert:
  - type: icontains
    value: risk
  - type: javascript
    value: output.toLowerCase().includes('not financial advice')
- vars:
    coin: Ethereum
    previous_price: 204,271.94
    predicted_price: 207,336.02
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Solana
    previous_price: 8,205.8
    predicted_price: 8,328.89
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Binance Coin
    previous_price: 61,942.01
    predicted_price: 62,871.14
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Bitcoin Cash
    previous_price: 36,985.22
    predicted_price: 37,540.0
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Litecoin
    previous_price: 5,222.07
    predicted_price: 5,300.4
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Chainlink
    previous_price: '918.89'
    predicted_price: '932.67'
