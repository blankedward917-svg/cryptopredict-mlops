prompts:
- prompts/crypto_summary.txt
providers:
- id: echo
  config:
    echo: 'The price of {{coin}} is predicted to move from {{previous_price}} to {{predicted_price}}.
      WARNING: Crypto trading involves high risk. This is not financial advice.'
tests:
- vars:
    coin: Bitcoin
    previous_price: 7,403,595.0
    predicted_price: 7,514,648.92
  assert:
  - type: icontains
    value: risk
  - type: javascript
    value: output.toLowerCase().includes('not financial advice')
- vars:
    coin: Ethereum
    previous_price: 203,931.42
    predicted_price: 206,990.39
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Solana
    previous_price: 8,159.8
    predicted_price: 8,282.2
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Binance Coin
    previous_price: 61,673.88
    predicted_price: 62,598.99
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Bitcoin Cash
    previous_price: 36,071.17
    predicted_price: 36,612.24
  assert:
  - type: icontains
    value: risk
- vars:
    coin: Litecoin
    previous_price: 5,180.27
    predicted_price: 5,257.97
  assert:
  - type: icontains
    value: warning
- vars:
    coin: Chainlink
    previous_price: '912.4'
    predicted_price: '926.09'
